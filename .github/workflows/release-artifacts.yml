name: Release Artifacts

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $version = python -c 'import ast; from pathlib import Path; tree = ast.parse(Path("hosty/utils/constants.py").read_text(encoding="utf-8")); print(next((node.value.value for node in tree.body if isinstance(node, ast.Assign) for target in node.targets if isinstance(target, ast.Name) and target.id == "APP_VERSION" and isinstance(node.value, ast.Constant) and isinstance(node.value.value, str)), ""))'
          if (-not $version) {
            Write-Error "APP_VERSION not found"
            exit 1
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate release tag matches APP_VERSION
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ github.event.release.tag_name }}"
          function Normalize-Version([string]$value) {
            $v = ($value ?? "").Trim()
            $v = $v -replace '^[vV]', ''
            if ($v -match '^\d+\.\d+$') {
              return "$v.0"
            }
            if ($v -match '^\d+\.\d+\.\d+$') {
              return $v
            }
            return $null
          }

          $normalizedVersion = Normalize-Version $version
          $normalizedTag = Normalize-Version $tag

          if (-not $normalizedVersion -or -not $normalizedTag -or $normalizedTag -ne $normalizedVersion) {
            Write-Error "Release tag '$tag' does not match APP_VERSION '$version'"
            exit 1
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows.txt pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name Hosty --hidden-import hosty.ui.windows.application --collect-submodules hosty.ui.windows --collect-submodules hosty.backend --exclude-module gi --exclude-module hosty.application hosty.py

      - name: Rename EXE with version
        shell: pwsh
        run: |
          Move-Item -Path "dist/Hosty.exe" -Destination "dist/Hosty-${{ steps.version.outputs.version }}-windows-x86_64.exe"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-windows-exe-${{ steps.version.outputs.version }}
          path: dist/Hosty-${{ steps.version.outputs.version }}-windows-x86_64.exe

  build-linux-flatpak:
    name: Build Linux Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(python3 -c "import re; from pathlib import Path; text = Path('hosty/utils/constants.py').read_text(encoding='utf-8'); match = re.search(r'^APP_VERSION\\s*=\\s*\"([^\"]+)\"', text, re.MULTILINE); print(match.group(1) if match else '')")
          if [ -z "$VERSION" ]; then
            echo "APP_VERSION not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches APP_VERSION
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          normalize_version() {
            value="$1"
            value="${value#v}"
            value="${value#V}"
            if [[ "$value" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "$value.0"
              return 0
            fi
            if [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "$value"
              return 0
            fi
            return 1
          }

          if ! NORMALIZED_TAG="$(normalize_version "$TAG")" || ! NORMALIZED_VERSION="$(normalize_version "$VERSION")" || [ "$NORMALIZED_TAG" != "$NORMALIZED_VERSION" ]; then
            echo "Release tag '$TAG' does not match APP_VERSION '$VERSION'" >&2
            exit 1
          fi

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=repo build-dir packaging/flatpak/com.github.hosty.Hosty.yml
          flatpak build-bundle --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo repo "Hosty-${{ steps.version.outputs.version }}-x86_64.flatpak" com.github.hosty.Hosty stable --arch=x86_64

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-linux-flatpak
          path: ./*.flatpak

  upload-release-assets:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-exe
      - build-linux-flatpak
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.flatpak
