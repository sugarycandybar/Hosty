name: Release Artifacts

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows.txt pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name Hosty --hidden-import hosty.ui.windows.application --collect-submodules hosty.ui.windows --collect-submodules hosty.backend --exclude-module gi --exclude-module hosty.application hosty.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-windows-exe
          path: dist/Hosty.exe

  build-linux-rpm:
    name: Build Linux RPM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(python3 -c "import re; from pathlib import Path; text = Path('hosty/utils/constants.py').read_text(encoding='utf-8'); match = re.search(r'^APP_VERSION\\s*=\\s*\"([^\"]+)\"', text, re.MULTILINE); print(match.group(1) if match else '')")
          if [ -z "$VERSION" ]; then
            echo "APP_VERSION not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Build RPM payload
        run: |
          rm -rf package-root
          mkdir -p package-root/usr/share/hosty
          mkdir -p package-root/usr/share/applications
          mkdir -p package-root/usr/share/icons/hicolor/scalable/apps
          mkdir -p package-root/usr/bin

          cp -a hosty package-root/usr/share/hosty/
          cp hosty.py package-root/usr/share/hosty/hosty.py
          cp packaging/linux/com.github.hosty.Hosty.desktop package-root/usr/share/applications/hosty.desktop
          cp packaging/linux/com.github.hosty.Hosty.svg package-root/usr/share/icons/hicolor/scalable/apps/com.github.hosty.Hosty.svg

          printf '%s\n' '#!/usr/bin/env sh' 'exec /usr/bin/python3 /usr/share/hosty/hosty.py "$@"' > package-root/usr/bin/hosty
          chmod +x package-root/usr/bin/hosty

      - name: Build RPM
        run: |
          fpm -s dir -t rpm \
            -n hosty \
            -v "${{ steps.version.outputs.version }}" \
            --iteration 1 \
            --architecture x86_64 \
            --license GPL-3.0-or-later \
            --description "Hosty Fabric Minecraft server manager" \
            --url "https://github.com/${{ github.repository }}" \
            -d python3 \
            -d python3-requests \
            -d python3-psutil \
            -C package-root \
            .

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-linux-rpm
          path: ./*.rpm

  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(python3 -c "import re; from pathlib import Path; text = Path('hosty/utils/constants.py').read_text(encoding='utf-8'); match = re.search(r'^APP_VERSION\\s*=\\s*\"([^\"]+)\"', text, re.MULTILINE); print(match.group(1) if match else '')")
          if [ -z "$VERSION" ]; then
            echo "APP_VERSION not found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install AppImage tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppDir payload
        run: |
          rm -rf AppDir
          mkdir -p AppDir/usr/share/hosty

          cp -a hosty AppDir/usr/share/hosty/
          cp hosty.py AppDir/usr/share/hosty/hosty.py
          cp packaging/linux/com.github.hosty.Hosty.desktop AppDir/com.github.hosty.Hosty.desktop
          cp packaging/linux/com.github.hosty.Hosty.svg AppDir/com.github.hosty.Hosty.svg

          printf '%s\n' '#!/usr/bin/env sh' 'HERE="$(dirname "$(readlink -f "$0")")"' 'exec /usr/bin/env python3 "$HERE/usr/share/hosty/hosty.py" "$@"' > AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "Hosty-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosty-linux-appimage
          path: ./*.AppImage

  upload-release-assets:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-exe
      - build-linux-rpm
      - build-linux-appimage
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.rpm
            release-assets/**/*.AppImage
