      - install -d /app/share/hosty
      - cp -a hosty /app/share/hosty/
      - install -Dm755 hosty.py /app/share/hosty/hosty.py
      - install -Dm755 packaging/flatpak/hosty-wrapper.sh /app/bin/hosty
