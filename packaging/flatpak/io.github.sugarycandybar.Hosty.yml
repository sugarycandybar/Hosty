app-id: io.github.sugarycandybar.Hosty
branch: stable
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: hosty
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --own-name=org.kde.StatusNotifierItem-*
  - --own-name=org.freedesktop.StatusNotifierItem-*
  # Removed broad home access to avoid exposing the user's full $HOME.
  # Hosty stores data under XDG_DATA_HOME (e.g. ~/.local/share/hosty)
  # inside the Flatpak sandbox and does not require --filesystem=home.
modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - python3 -m pip install --prefix=/app --no-build-isolation --no-index --find-links="file://${PWD}" requests psutil pillow pystray
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d7/8e/7540e8a2036f79a125c1d2ebadf69ed7901608859186c856fa0388ef4197/requests-2.33.1-py3-none-any.whl
